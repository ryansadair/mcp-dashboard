# Martin Capital Partners — Automated Data Pre-Fetch
# .github/workflows/prefetch.yml
#
# Runs on GitHub's servers, pushes data to Supabase.
# No dependency on Ryan's office machine.
#
# Schedule: every 15 min during US market hours only (EDT).
# Market: 9:30 AM - 4:00 PM ET. We run 9:00 AM - 4:30 PM ET for buffer.
# EDT = UTC-4, so 9:00 AM ET = 13:00 UTC, 4:30 PM ET = 20:30 UTC.
#
# Two cron lines cover 13:00-20:30 UTC, Mon-Fri:
#   Line 1: minutes 0,15,30,45 for hours 13-19 UTC
#   Line 2: minutes 0,15,30 for hour 20 UTC (last 3 slots)
#
# The Python script has its own market hours check as a safety net
# (with DST detection), so even if cron fires at a bad time, it exits
# cleanly in <1 second.
#
# NOTE on DST: These cron times are for EDT (Mar-Nov). During EST
# (Nov-Mar), market hours shift to 14:00-21:30 UTC. Update these
# crons after the November DST change, or rely on the Python safety
# net which auto-detects DST and will simply skip the early/late runs.
#
# GitHub Actions cron caveat: GitHub may delay or skip scheduled runs
# on low-activity repos. A manual trigger is always available as backup.
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_URL  — e.g. https://idtytpyehfbqldnvwenb.supabase.co
#   SUPABASE_KEY  — your service role key (not anon key)

name: Data Pre-Fetch

on:
  schedule:
    # EDT market hours: 13:00-19:45 UTC, Mon-Fri
    - cron: '0,15,30,45 13-19 * * 1-5'
    # EDT market close buffer: 20:00, 20:15, 20:30 UTC
    - cron: '0,15,30 20 * * 1-5'

  # Manual trigger (for testing or forcing a refresh)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - quick
          - full
          - eod

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests openpyxl

      - name: Run prefetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            if [ "$MODE" != "auto" ]; then
              python prefetch_cloud.py --mode "$MODE" --force
            else
              python prefetch_cloud.py --mode auto
            fi
          else
            python prefetch_cloud.py --mode auto
          fi

      - name: Log result
        if: always()
        run: |
          echo "Prefetch completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"