# Martin Capital Partners — Automated Data Pre-Fetch
# .github/workflows/prefetch.yml
#
# Replaces Windows Task Scheduler. Runs on GitHub's servers,
# pushes data to Supabase. No dependency on Ryan's office machine.
#
# DESIGN: Single cron entry runs every 15 min, 24/7/365.
# The Python script itself checks market hours and exits early
# if outside the window. This avoids GitHub Actions' cron throttling
# issue where multiple cron lines on low-activity repos get merged
# or skipped.
#
# Market hours check (in prefetch_cloud.py):
#   - Mon-Fri, 9:00 AM - 4:30 PM ET (with DST auto-detection)
#   - Auto-mode: first run = full, last run = eod, rest = quick
#   - Outside market hours: exits with code 0 (no error)
#
# The keepalive step prevents GitHub's 60-day inactivity auto-disable
# by committing a tiny timestamp file on Sundays.
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   SUPABASE_URL  — e.g. https://idtytpyehfbqldnvwenb.supabase.co
#   SUPABASE_KEY  — your service role key (not anon key)

name: Data Pre-Fetch

on:
  # Single cron: every 15 min, every day.
  # Python handles market hours gating — this simplifies GitHub's scheduler
  # and avoids the throttling that happens with multiple cron lines.
  schedule:
    - cron: '*/15 * * * *'

  # Manual trigger (for testing or forcing a refresh)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - quick
          - full
          - eod

jobs:
  prefetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests openpyxl

      - name: Run prefetch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            # Manual dispatch with non-auto mode should force run
            if [ "$MODE" != "auto" ]; then
              python prefetch_cloud.py --mode "$MODE" --force
            else
              python prefetch_cloud.py --mode auto
            fi
          else
            python prefetch_cloud.py --mode auto
          fi

      - name: Log result
        if: always()
        run: |
          echo "Prefetch completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  # ── Keepalive: prevent GitHub's 60-day inactivity auto-disable ────────
  # Runs once a week (Sunday midnight UTC) and commits a tiny file
  # so the repo shows activity and GitHub doesn't disable the schedule.
  keepalive:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/15 * * * *'
    # Only run on Sundays (day 0 in cron, but we check in the step)
    steps:
      - name: Check if Sunday
        id: check
        run: |
          DAY=$(date -u +%u)  # 1=Mon, 7=Sun
          HOUR=$(date -u +%H)
          MIN=$(date -u +%M)
          # Run only on Sunday at ~00:00 UTC (first cron hit of the day)
          if [ "$DAY" = "7" ] && [ "$HOUR" = "00" ] && [ "$MIN" -lt "16" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repo
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update keepalive timestamp
        if: steps.check.outputs.run == 'true'
        run: |
          date -u '+%Y-%m-%d %H:%M:%S UTC' > .github/keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --cached --quiet || git commit -m "keepalive: $(date -u '+%Y-%m-%d')"
          git push || echo "Push failed — repo may be read-only"